body:
  text: 九入法際智所謂四十辨才者以諸辨才巧入諸法差別邊際故言入法際智四十辨才者四無礙智有十種故如十地論云是四無礙智十種差別一依自相二依同相三行相四說相五智相六無我慢相七小乘大乘相八菩薩地相九如來地相十作住地相自相者有四一生法自相二差別自相三想堅固自相四彼想差別自相如經是菩薩用法無礙智知諸法自相故以義無礙智知諸法差別相故以辭無礙智知不壞說諸法故以樂說無礙智知諸法次第不斷故同相者有四種一者一切法同相二者一切有為同相三者一切法假名同相四者假名假名同相如經復次以法無礙智知諸法無體性故以義無礙智知諸法生義相故以辭無礙智知諸法假名而不斷假名法說故以隨說無礙智隨假名不壞無邊法說故乃至廣說次言一切功德行皆成就者此四十辨才門中一切德行無不攝故心習已滅無明亦除者此地名為心自在地著心重習已斷滅故作得住地無明之內迷心空者亦已除故一切佛藏者以諸多羅尼得諸佛法藏如彼經言第九菩薩地名為得諸佛法藏能作大法師得眾義多羅尼眾法多羅尼乃至滿足十阿僧祗百千多羅尼門故一切變通藏者以得法明自在力故遍於十方作變作故如彼經言是菩薩於不可說不可說世界遍滿其中隨心隨根隨信說法得法明故求如來力滿足佛事與一切眾生而作依止故無量以下重顯上句十無礙智觀所謂無量法雲雨及一切眾生者法雲之義略有二種一能受諸佛無量法雨二能注眾生無量法雨今約後義以顯法雲如彼經言佛子是菩薩住此法雲地自從願力起大慈雲震大法雷音通明無畏以為電光大智慧光以為疾風大福德善根以為原密雲現種種色身為障色雲說正法雨破諸魔怨於一念間無量無邊百千萬億那由他世界皆亦遍覆注大法甘露善根法雨滅除眾生隨心所樂無明所起煩惱塵炎是故此地名為法雲故二習無明今已盡滅者色心自在此地轉增微細二習已盡故其本無明亦得滅故受大職位者如彼經言菩薩隨順行如是智得入受位地即得菩薩名離垢三昧而現在前乃至十阿僧祗百千三昧最後三昧名一切智智受勝位三昧而現在前即有大寶蓮華王出周圓如十阿僧祗百千三千大千世界乃至廣說故神通無量不可具說現同如佛無相用故者如彼經言住此菩薩法雲地於一切界中從兜率天退入胎住胎乃至大般涅槃一切佛事隨所度眾生得智自在乃至百千阿僧祗世界乃至廣說故如是以下第二總結指華嚴經十地品也無垢地中文有三分先心次行後即總結初名入法界心者入一法界之初門故為究竟道之方便故次明行中有二先顯所依定後明能依行初中言勇伏定者能伏佛地所斷障故從此定入法光三昧登法界山頂照諸法界故次能依行總標別顯若依前說三地相配者此中明所依定在百劫位彼言住壽百劫脩千三昧故別明十中前之四法在千劫位彼言住壽千劫學佛威儀乃至神通化導之法故後之六法在萬劫位彼言住壽萬劫化現成佛入大寂定等覺諸佛二諦界外非有非無無心無色因果二習無習無有遺餘現同古佛但有應名現諸色心教化眾生常行中道大樂無為而生滅為異故今前四中第三重習先所行法門者謂前二門仰脩佛德率成為難所以重習第四問訊亦為學佛威儀所攝五與無明父母別者不生佛地故今先別此位猶與無明俱故六入重玄門者謂空空門名為重玄此空空門唯佛所窮今得少分故名為入七現同如佛現一切形相者現同古佛現諸色心故八二種法身具足者於因行中得具足故九無有二習者因果二習無有餘故法執為因人執為果此二熏習皆斷故是約最後一念而說從此已前猶有餘故十登中道第一義諦山頂者謂前四門所顯中道於此位中得到頂故是故以下第二總結於中四句一舉先行二顯今德三示前廣說四結今略說初中有二先通舉四十心後別舉十地身四十心內之第四十此是聖位有二身故經百千劫以下今德亦經萬劫但略舉耳第三示廣說中第三禪者華嚴經中不現此會應在彼經大本文也第四略說文相可知妙覺地中亦有三分先心次德第三結明初中言寂滅心者寂照慧故妙覺地下第二顯德略舉四德一常德二智德三不可思議德四獨在無二德初中言妙覺地者遠離一切雜染之麤亦離一切無明亦眠故常住一相者離諸生滅無前後異故第一無極者無始無終無中無邊若縱若橫無窮際故即由是義湛若虗空第二中言一切種智者總舉如來能照智故下即別顯於中有四一二諦門二始終門三雜染因果門四清淨因果門初中無生者達無諦故有諦始終者照有諦故無始為始無終為終欲顯照窮假說始終故第二中言眾生根本者謂四住地有始者以如來藏為其本故有終者二種生死為其末故至後文處當更分別第三第四中言一念知者如來實無前後念異但此菩薩無常之智如彼一念頃佛能遍知故第三德中言住不可思議者佛住無上菩提有五不思議故如無上依經言一切如來住無上菩提處有五種因緣不可思議何等為五一者自性二者處三者住四者為一異五者為利益云何如來為菩提自性不可思議即色是如來不可得離色是如來不可得受想行識亦如是四大六根亦如是即有法是如來不可得無法亦如是是名菩提自性不可思議云何如來為菩提處不可思議如來在欲界不可思議離欲界不可思議色無色界亦如是六道十方亦如是是名處不可思議何者住不可思議安樂住如來住不可思議寂靜住如來住不可思議如是有心住無心住梵住如來住不可思議云何為一異不可思議三世如來在一處住何者一處自性清淨無漏法界是諸如來若一若異不可思議云何為利益事不可思議如來等一法界智慧神力皆悉平等住於無漏清淨法界能為眾生無量利益是名利益不可思議復次不可思議有二種一者不可言說過語言境界故二者出一切世於世間中無譬類故是名不可思議故第四德中言二諦之外獨在無二者人王經言超度世諦第一義之外為第十一地薩云若覺有非無法然清淨言世諦者謂依他性及分別性有無二諦此中合為世諦依他性中分別性無所顯真如名第一義諦如來歸於一心之原非有非無非虗非實非有為非無為非差別非平等故言二諦之外是第三諦無比無對名無二諦名無盡諦故言獨在無二如華嚴言由信解力故知非得無盡諦智故吾先以下第三結明先指廣說後結略說上來第一正明行德此下第二諸門分別於中有二先問後答問中言後一地者謂如來地法性身者以依法性而生實智故從所依名為法性下文言實智法身即此身也答中有六一出世界門二世間果門三能治門四所治門五二生門六二業門初中有三先顯二身次顯二土第三重顯身土初中有二總標別解義如前說文相可知二土中文有三謂標釋結釋中有二先兼顯凡夫土後正明聖人士此中有二先菩薩士後如來土是故以下第三結也初地一念以下第三重顯甚深於中有三一者二身甚深二者法身甚深三者因果甚深初中有二先明難量後顯假說假說中言初地百身千身萬身等者二地千身三地萬身等有縛有解者其攝報果限在百數故言有縛其願智果出數量外故言有解又望未斷故言有縛望其已斷故言有解其法身處以下第二法身甚深於中有二先明理智無見後顯量智有見亦可得言以下第三因果甚深於中有三先明假說有因有果三賢為因妙覺為果故次明因果絕言化道假說汝應以下第三結勸第二世間果中有二謂牒釋結第二釋中有十五階前四階中皆有五句一莊嚴二王位三眷屬四受教處五教化處後十一中唯有四句初階中銅寶瓔珞者喻十住行莊嚴其身故銅輪王者受王位時銅輪來應故有福子者王有百子皆有福德故生一佛土受佛教行者一時得生一佛世界故教二天下者於二天下而作王故下下五句准此應知第三中言入十方佛國中者一時得生十佛世界故歡喜地中四天王者華嚴經說多作閻浮王者此是佛成道處為欲建立佛法故生今此中言四天王者上下階降當此處故是故二文皆有道理諸餘異說准此應知千寶瓔珞以下二地萬寶瓔珞以下三地乃至等覺三界王者亦化無色界眾生故生在非想非非想處故如十住斷結經言佛言與汝說無色定四大造色所謂為色彼無此色乃謂無色夫色有五乃成四大唯無形色故謂無色痛色行色識色非是凡夫五通所覩唯有如來阿維顏菩薩乃見彼色不退菩薩執權方便往遊有想天上與彼微識說微妙法妙覺中言法界王者通化無邊法界眾生故佛子以下第三總結動止俱遊者外相寶輪隨王俱行故常隨其身者內行瓔珞常隨二身故第三能治門中有二別明總顯言三賢菩薩伏三界煩惱麤業道麤者已伏三界分別起惑亦伏惡道不善業故相續果亦起麤者八難之果亦不起故是見道喜忍伏三道業道者斷三惡道業種子故而未能離根本無明故名為伏上地諸伏皆作是說也初地障有二無明中第二惡道業無明也離忍伏人中業道者微細犯戒種種業行人道多起故名人中業第二地障有二之中第二種種業行無明也明忍伏六天業道者六欲天中五欲分別障第三地勝定行故此下諸障思數相應通名業故第三地障有二之中第一欲貪愚癡也炎忍伏諸見業道者於諸教法如言取義障第四地道品行故第四地障有二之中第二微妙淨法愛因無明也勝忍伏疑見業道者為入生死為入涅槃如是猶預故名疑見第五地障有二之中第一一意欲入涅槃一意欲入生死思惟無明也現忍伏因果道者分別十二因緣行相第六地障有二之中第一行法相續顯現無明也無生忍伏果業道者分別果法剎那三相七地二中第一微細諸相或現不現無明也不動忍伏色因業道光忍伏心因業道者著色著心現行分別望可熏種說名因故永不現行故名為伏八九二地有二之中皆取第二無明障也寂滅忍伏心色二習業道無垢忍伏道果習者第十地中能斷二著之熏習故無垢地中能捨二著之麤重故依彼現因及與熏習所生麤重相續不斷故說麤重名為彼果就實而言一一地中皆斷三種但為顯其能治轉深故說先因次習後果又麤重有二種若煩惱品麤重種子斷時亦隨斷滅若異熟品麤重是彼種類而微薄者種子滅後相續不絕故言習先已滅而果不敗亡今捨此故為伏習果也是故以下第二總明總作三位以明伏斷三賢唯伏未能見故十一地中亦伏亦斷未拔根本故已斷種子故妙覺忍中唯斷非伏根本無明已永盡故法界中一切無明者異熟識中所起無明於中生得佛地頓斷故言頓斷於中委悉後文當說此下第四所治愚門在文有二先因後果因愚之中別明總結別中先明根本無明不了一切法迷法界而起三界業果者不了一切法即是一法界如起信論云不達一法界故心不相應忽然念起名為無明故次顯技末於中言戒盜見者即是戒取計邪因故果盜見者即是見取計邪果故謂於生死計樂淨等又有足上故名果見如是二種名盜見者邪取之義名為盜故疑見者推求道理猶預分別是慧分別故名為見猶預之慧以為疑故為顯是義故言七見見一切處求故見言六著者開貪為三障出離道最勝因故淫欲名欲餘名貪愛著現前境名貪願戀過去希求未來總名為愛又於欲界外門所起名貪色無色界內門所起名愛於法界中一切時起者謂如說十三熏習異熟識中恒流不絕故所以是識名法界者能持三界諸法種子故界是持義及因義故佛子以下第二總結一切煩惱以十三為本者隨煩惱中大中及小皆以十三為根本故無明住地與此十三而作本故是以已下次明果愚於中有三總標別釋後明相攝別釋中言見著二業者見著二惑所發業故如是惑業迷異熟識之所攝持諸色欲心所起之報分為欲界若離淫欲但迷色心所起之報分為色界若離色愛但迷定心所起之報為無色界故是故以下相攝分齊於中有二先明相攝後顯不攝初中言不出法界者皆為異熟識所攝故第二中言唯佛一人出法界外者唯佛能離異熟識故來入法界藏者以應化身入於三界故人王經中名三界藏彼言一切眾生煩惱不生出三界藏一切眾生果報二十二根不出三界諸佛應化法身亦不出三界三界外無眾生佛何所化是故我言三界外別有一眾生界藏者外道大有經中說非七佛之所說此義具如一道章說此下第五明二生門於中有二別明總結別中有二先明業生後顯變生業生之內亦有二別三賢位中伏麤無明離於繫業而有細愛用不繫業故善為緣子者報因種子為增上緣故愛為潤業者以現行愛潤業種子故故名息用而不斷愛用者息繫業用故異前凡夫愛用潤業故異後聖人也次言十一人亦伏法界中三界業果者總舉聖位初地乃至七地三界果俱伏盡無餘八地乃盡者明此位中理以業生用願智力自在生故故不起愛以為潤業乃至七地愛最後身復不更受故言無餘八地不受故言乃盡也從此以上示現作佛此下第二顯變化生謂從八地以上四地不受三界業種子報故言無子愛三界之報以三界煩惱皆伏盡故法執無明未能伏盡故言唯有無明習在以是法執無明力故發無漏業受變易報而其三界熏習種子乃至金剛相續不絕是故說為不出三界又其淨土依止妙色雖是無漏法處所攝而皆依止於異熟識是故不名為淨土也以大願力故變化生者謂於穢土王宮受生及與六道受種種生皆是變化不由業生故以是故我昔以下總結天中說者第六天中說是義故業生者七地已還故變生者八地已上故此下第六明二業門於中有二別明總結初慧業中言無相無生智者忘分別相及依他生故心心緣法性者證實性故而生無照者以離能取所取分別故伏斷等業亦是慧業但前已顯故今不說耳智出有諦中有為無漏等者依正體智出後得智於中俱有慈悲等德上弘佛道下化眾生所以通名為功德業從初聖以下重顯功德業以變易故畢故不造新者功德轉增前變後易故於生死有漏之業但能畢故而不造新也變化生一切者七地以下雖有業生而亦兼有變化生故釋義品正明六入有三分中初列名字次辨觀相如是二分竟在於前此第三依觀行相釋前名義訓釋諸名義故名釋義品也在文有四牒問許說總標別釋初牒問者學觀品初問言云何菩薩學觀名字義相及心所行法復當云何此二問中後問已答前義相問彼品略答而未廣釋故今重牒言汝先言義相云何者也所謂以下第二許說六位義相佛子以下第三總標所釋體義菩薩體者謂種性體義名功德者依種性起一切功德有大義利故有深所以故佛以下第二別釋釋六位義即為二分前三後三為二分故釋三賢中別明總結初十住內釋初有二先明入住方便後釋正入住相初方便中八句示現一牒所入位二舉能入人三者發心四者立名五者修行六者受報七者得失八者進退發心住者是牒所入是人以下舉能入人言具縛者在外凡位不識者不識三寶故不解者不解望人故不智者以迷好惡因故不知者不了苦樂果故從不識以下第三明發心值佛菩薩教法者謂或值佛或值菩薩或值佛及菩薩教法故中起一念信者於三境起決定信信有佛道修行可得故發是信已名入內凡發菩提心者於大菩提發決定願願我當成無上菩提作諸眾生一切義利故此人以下第四立名言爾時者發心已後言住前者初住已前是時名為信想菩薩以能修行十信心故假名菩薩者心未堅實故猶如輕毛故名字菩薩者行不稱名故未得義相故其人以下第五修行於中有二先明十信後顯十戒言十善者謂遮十惡五八十戒者是攝律儀戒六波羅蜜戒者是攝善法戒也復行以下第六受報於中亦二先牒十善及十信因後顯天報及人王報鐵輪王者統領一州如色薀門總攝諸色粟散王者別領諸國如界門中十色界別等故如粟別故曰散若依是義自餘諸王各領別國皆名粟散如仁王經言上品十善鐵輪王中下品十善粟散王故今此經中分粟散王以別二品其中品者仍受本名下品王者別名人王由發大心故得為王善根差別故有三別也具足以下第七得失雖具諸惑而集諸善根亦退以下第八進退先標後釋文相可知佛子以下明初住相於中有二先牒方便始入以下正明住相依人空盡門得顯種性故言始入空界住空性位始入空界是發心義依人空門初發心故依人空智發有中行依佛教法作意脩習一切功德是為住義離諸分別不自造心任運生起一切功德是為地義而今未得是故不名為地但得名住此是簡別住與地別也治地中言常隨空心淨八萬四千法門者依六度法淨爾許門是義廣說如賢劫經彼有菩薩名曰喜王晏坐七日作是思惟菩薩行何三昧便速逮致八萬四千諸度法門陀羅尼門等過七日已往詣佛所請前所念佛時對曰快問是義有三昧門名了諸法本行是三昧便速逮致八萬四千諸度門等何者是其八萬四千彼經中說諸佛功德凡有三百五十種門於彼三百五十種德各修六度以之為因便有二千一百諸度對治四大六衰之愚便有二萬一千諸度言四大者謂內四大言六衰者謂外六塵六塵之賊衰耗善法故名為衰彼前二萬一千諸度各對眾生四種心患便有八萬四千諸度言四患者多貪瞋癡及等分行是謂八萬四千法門次言清淨鮮白故名治地者依前八萬四千法門能治四大六衰四患所以心地清白故名治地住也修行中言長養一切行者依前所治清白心地長養諸行故名修行也生貴中言生在佛家種子性清淨者依所修行得生佛家由佛教力空解轉增故名生貴也多習無量善根者巧便修習眾多善根以之故名方便具足也成就第六般若者對治邪執故名正心也入無生畢竟空界者依般若力轉入三空有進無退名不退也從發心不生倒者從發心來遠離顛倒不起煩惱邪魔可以破菩提心以是義故名為童真猶如年少沙彌生來不犯色欲如央掘魔羅經言爾時世尊告央掘魔汝當受持童真淨戒子注中言童真是沙彌別名胡本云式叉宋言學亦言隨順無違今此位中名童真者從發心來隨順理教而無違義也當紹佛位者由前童真隨順力故從教生解名法王子也得無生心最上者生空解中此最勝故故名灌頂也十行中先總明進入五陰法性空者前十住中得內人空此十行位得內法空依法空解亦行八萬四千法門是故通名為中十行次別明中始入法空者前得人空而猶存法今得法空於內無遺是故始生歡喜心也第二中言常化眾生者內持戒行外導眾生故名饒益也於實得法忍心者於法實性得法忍心依法忍故得眾生忍無我我所名無瞋恨也常住功德者精進無息所以常住常住不廢故名無盡也不失正念者依禪定力深伏癡亂所以臨終不濁是故名為離癡亂也生生常在者由般若力隨順覺者所以常在佛土現生故名善現也於我無我者依方便力巧離二邊乃至諸法無所染著故名無著也常順敬者依願度力常能隨順三世佛法故名尊重也說法度人者依力度動成物軌離惡行善故名善法也二諦非如者非二言下如言有二故曰非如所以然者以非相非非相故以非相故非如有諦之言非非相故非如無諦之稱作如是解離虗妄言以是義故名真實行是依智度以立其名與前慧度有何異者彼明遣相入空以順佛法身義此顯亦遣非相涉俗離虗妄義由是道理二度差別也十迴向中亦先總明眾生空者假名人空無我空者五陰法空無我之法亦性空故二空平等無別者其人空觀通遣自他親疎之性故言平等其法空觀遍遣內外差別之相故言無別一觀相者平等觀故一合相者無別見故上言入者一時頓入內外人法二空觀故是名第三平等空觀即為見道三心方便謂內遣有情假緣智者十住人空為方便故內遣諸法假緣智者十行法空為方便故遍遣一切有情諸法假緣智者以十迴向平等空觀為方便故從此方便立彼三心故學習百萬億乃至空觀故迴易前後者增前八萬四千法門以至百萬億諸法門故迴前空觀易後空觀展轉增進不相離故心心觀唯者前心觀其諸境唯心後心亦觀諸境唯心故明明寂滅者前明不取生起之相後明亦遣暄動相故如是心明長養地上真明觀法故言長養上地明觀法故迴因向果此中因者地前方便果者即指地上正觀乃至佛地一切功德即以是義名為迴向復以無量心者以四無量心受生三界故言不捨而無取著故言不受故十向法如是者是總結也常以已下第二別明常以無相心者離眾生相義常行六道者救護眾生義也觀一切法但有受等者釋不壞義不增假名而不住故但有受者是觀受假但有用者是觀法假但有名是觀名假是三假義後文當說也三世諸佛法一切時行者依教遍趣故言等行是釋等一切佛義也入一切佛國土者即是至一切處義也以常住三寶授與前人者於一心內蘊三寶德恒授與人而無窮盡即是無盡功德藏義也言相善者涉事化物之行無漏善者忘相觀空之解解時不壞假名行時不失空解如是習行不相違背故言隨順平等善根也一切法者有諦差別一合相者無相平等平等是如故曰如相也諸法無二者不著所取之境般若無生者不著能取之智不著能所是無縛義有無平等三世一合是解脫義也覺一切法第一義諦者是釋法界義中道無相一切法皆一照相者釋無量義是三十心以下第二總結三賢位也此下第二釋十二地於中有二總明別釋初中言汝先言云何名地者先總問名字義相今於其中別牒地耳持一切功德者謂法界體周遍攝持一切功德猶如大地持山海等生成一切因果者能生一切善因成熟一切善果猶如大地能生牙等成花菓等以是二義名為地故此下別明初地中言捨凡夫行者得聖法故捨凡夫性捨者即是過凡夫義下以十句顯是過義一者家過如經生在佛家故清淨法界為佛家故二者位過如經紹菩薩位故無所得心為菩薩位故三者聖眾過如經入聖眾中故已入諸大菩薩數故四者離邪過如經四魔不到故諸魔邪障不能壞故五者正觀過如經無二邊平等雙照故俱融有無而雙照故六者勝進過如經大信始滿習學無生中道第一義諦觀故信學佛地中道觀故七者兼照過如經常至二地三地乃至十一地故兼照最勝等餘門法界故八者當分過如經心心寂滅法流水中一相無相故遍滿法中界心心恒流故九者法身過如經二身無方故十者佛土過如經通同佛土故依十種殊勝功德無不歡喜故名歡喜地也以正無相者具足正戒遠離邪非而不取戒及持犯相故善入眾生界現萬佛世界者隨順眾生性現諸佛土故六通變化空同無為者雖無所為而無所為故內捨三輪之濁外離二邊之垢以是義故名離垢地也光慧信忍者此第三地忍度增上信忍三中居上品故仰依如來十二部光照諸眾生十二支根光光變通故名明地也大順無生起忍者順忍三中始入下品故觀一切法二諦相者雖復大順無生起忍而恒觀察有無相故上觀者上弘佛道下觀者下化眾生故是第三觀慈悲喜捨加三為七七觀照耀故名炎地也順忍脩道者順忍三中修中品故三界無明疑見一切無不皆空者依諸諦觀能勝煩惱故八辨功德入五明論者以是八五術勝諸世間故所謂四辨因果內道外道辨者是顯八辨於因於果各有四故以是八辨勝內外故因中四者依菩薩地有四辨故果中四者依如來地亦有四故如十地經言復次法無碍智知一切菩薩行法行智行隨順入以義無碍智知分別說十地義差別入以辭無碍智不壞說與隨順諸地道以樂說無碍智說一一地無量相論曰是中菩薩地相者有四種一智相二說相三與方便相四入無量門相是中故一切菩薩行者法行智行示現觀智說故十地差別者謂心說者口言應知不壞說與隨順諸地道者不顛倒教授故云何如來地相經曰復次以法無碍智知一切佛於一念間得正覺以義無碍智知種種時事相差別以辭無碍智隨正覺差別說以樂說無碍智於一一句法無量劫說而不窮盡論曰是中如來地相者有四種一法身相二色身相三正覺相四者說相是中時者隨何劫中成何等佛事者以何等佛土隨何等佛身相者隨名所記可得見聞故隨正覺者依十種佛如正覺說應知故如是二門各有四辨是故名為八辨功德內外者內明外明也方道者醫方也因果者因明論也宗名果故鬼師者種種呪咀是聲明論由是能勝世間諸道總而言之內即勝諸煩惱外即勝諸世間非彼所勝故名難勝也上順諸法觀者順忍上品故三世一合寂照無二是觀現行故名現前地也無生忍諸法觀者無生三忍中始入下品故非有煩惱非無煩惱者十地經言住此菩薩遠行地中不名有煩惱者不名無煩惱者何以故一切煩惱不現行故貪求如來智慧未滿足故一生一滅一果三界最後一身者是明遠至分段後邊故一入一出集無量功德乃至寂滅者是明長時入觀脩行以是二義故名遠行也言是故者是前已受最後身故此第八地捨三界報既捨分段三界故言變易果用此是三種意生身中大力菩薩意生身也入中忍無相慧者無生忍三中始居中品故出有入無化現無常者恒出有諦常入無諦任運並觀化現自在皆非常故是依出入無異之義以釋不動如人王經八地中言在有常脩空處空常萬化故自見己身當果諸佛摩頂說法者己身相續所成當果有二法身之中果極法身無二無別應化法身隨緣眾多菩薩自見應化法身故言諸佛今此菩薩以眾多身現諸佛會故彼諸佛各為說法此菩薩心遍彼諸身隨聞說法各別脩行故言身心別行如是道理非思量境故言不可思議是依當果決定之義以釋不動以是二義名不動地也復入上觀光光佛化者無生三忍中復入上品觀智光色光無不妙故以是二義名妙慧地菩薩爾時入中道第一義諦觀者是明能入第十法界此是總句下出別義十句示現一者行入如經大寂忍下品中行行佛行處故二者受入如經坐千寶相蓮華受佛記位故三者學入如經學佛化功故四者斷入如經二習伏斷故五者信入仰信佛智如經大信成故六者證入通達自境如經同真際等法性故同者以離能所二分別故等者其三世平等性故如仁王經言智慧雖起滅以能無生無滅故七者平等入依內證智成一味德如經二諦一相一切功德故八者差別入以外化智善達機根如經入眾生根故九者內教入如經無量瓔珞功德故十者外形入如經一時等示一切形相故依此十種功德之法潤彼六道眾生善根故名法雲地也無垢地中在文有三一者顯德二立人稱三釋地名初中言住大寂門中品忍觀者第五大寂忍有三品之中今此位中住中品故此是總句此住有十種一者滿住因行圓滿如經功行滿足故二者登住登中道頂如經登大山臺故三者心住如經入百千三昧故四者身住如經集佛儀用故五者有為住有異熟識苦諦生滅如經唯有累果無常生滅故六者無為住遠離一切分別造作如經心心無為故七者過下住下十地中因行未滿如經行過十地故八者同上住照中道頂佛智不過如經解與佛同故九坐處住恒坐如來座為眾生說法如經坐佛座處故十境界住二諦一切法二智無不見如經其智見二常無常一切法境故言見二者今猶未出二諦外故當知以下相形立名於中有二先立後釋所以已下是第二釋大變力者神通力故百劫萬劫者略千劫故八法輪者為二乘轉有作四諦法輪為菩薩轉無作四諦法輪故乃至進止一切法同者以是義故名為學佛也住是以下正釋地名所言是者指前說故入金剛三昧者依前所住百千三昧乘入最後金剛三昧此時不為諸相所壞故言一相無相亦復不為諸垢所礙故言寂滅無為以是義故名無垢地妙覺地中亦有三分總標別釋第三總結初總標言妙覺上忍大寂無相觀者大寂忍三品中妙覺在上品故別釋之中有其二句初句顯德後句釋名顯德之內有二子句初顯利他功德周遍後顯自利功德圓滿唯以一切眾生緣生善法者如來圓智無功用心但由一切眾生機緣任運遍生一切善法是為利他功德周遍亦自持一切功德者雖恒與他一切善法而常不失自內圓德是為自利功德圓滿以是二義故名佛藏此下第二釋妙覺名於中二句正釋簡別而寂照一切法者雖無功用而有遍照寂者妙義遠離生滅起動之亂故照者覺義永斷無明闇昧之眠故以是二義故名妙覺下簡別言自佛以下一切菩薩照寂者但照本來寂滅之理故名照寂而其內心未離生滅其能照智不離無明是故未能寂照不名妙覺者也第三總結之中有二先指廣說後結略說佛母品依廣開門顯經宗內科其四品為二分中正明六入竟在於前此下一品顯六入境言佛母者母是生長之義三世諸佛一切種智皆依二諦中道而生此處顯是義故名佛母品爾時以下在文有二一者正明佛母二者諸門分別初中亦二先問後答問中有二先舉智問後就境問初中言二初照智者謂佛初智菩薩初智為問生義故舉初智寂照照寂之義復云何者寂照慧依何起此是通問初後二智就境問中亦有二句先問二諦法性後問第一義諦答中次第答前二問前問中正答重釋正答二句先明三諦為母後顯諸門為母言乃至者十六諦中先舉三諦後顯十三諦門乃至一切法門無有不為智之母故二諦以下是答後問在文有三謂牒釋結釋中有二別釋總明別釋二諦即有四門一有無有門二二無二門三因緣門四假名門有無有門者謂分別性有理有事道理假有假有非空名為有諦事法實無實無是空名為無諦如經世諦有故不空無諦空故不有故如是二諦常非不爾故不一而實非然故不二如經二諦常爾故不一聖照空故不二故此中二諦常爾者假有不成假無實無不成實有故此是如量智所分別聖照空者假有不成假有實無不成實無故此是如理智所通達所以假有不成假有者依名假立是為假有所依名言不可得故能依假有不得成立所以實無不成實無者遣所計有以立實無所遣實有不可得故能遣實無不得成立其如理智如是通達故言聖照空故不二是為初門二諦道理此中不二正顯真如即是中道第一義諦也第二二與不二門者前說一諦有無差別常爾不變名為世諦有無俱空平等一味是故名為第一義諦如經有佛無佛法界不變故不空第一無二故不有故此中法界者假有實無分齊不亂故名法界佛出世時說是有無分界佛滅度後有無分界不變是故先言有佛後言無佛也第一無二者是第一義無二相故如是世諦有無差別故與第一義諦不一有無不成故與第一義諦不二如經無佛有佛法界二相故不一諸法常清淨故不二故佛不出世之時有無分齊不亂若佛出世之時有無如本無亂不由佛出照無二故有無分界生其差別是故先言無佛然後言有佛也言諸法常清淨者謂隨言相皆不成就故與無相而不二也第三因緣二諦門者諸佛已出三界諸行而赴機緣還入六道如是感應因緣集會以知不無名為有諦雖不是無而不得有不得有故且謂之無雖謂之無而不存無有無俱無名為無諦如經諸佛還為凡夫故不空無無故不有故如上文言因緣集故謂之有非曰有是有因緣散故謂之無非曰有是無者正謂此門之二諦也人王經言無無諦實無寂滅第一空諸法因緣有有無義如是故此中無諦之空是真實故不與有諦為一有諦之法本不生故不與無諦為二故言空實故不一本際不生故不二此門二諦即是中道第一義所以然者有不生故即為無諦無亦空故即為有諦所以二諦即為中道如上文言二諦一諦一合相故第四假名二諦門者三假集有名為世諦實相名為一義諦如經不壞假名諸法相故不空諸法即非諸法故不有故人王經言法性本無性第一義空如諸有本有法三假集假有正謂此門之二諦相言三假者所謂法假受假名假此中名假是分別性依名假立諸法相故受法二假是依他性似人似法皆非實故此三假法非是法故不與第一義諦為二雖非是法非非法故不與第一義為一故言法非法故不二非非法故不一別明二諦竟在於前此下第二總明八不釋此文意略有二門一者通門二者別門言通門者謂如前說二諦四門各有此中四雙八不是義云何此初一雙不一不二總釋四門不一不二言之與義不異前故其第二雙不常不斷通釋四門不空不有有即為常無便斷故第三不來亦不去者重顯初雙不一不二有空不一故有不從空來空有不二故空不遣有去也第四不生亦不滅者重顯第二不常不斷不生故不有不滅故不無無是斷義有即是常邊故是故八不通於四門也若就別義釋此四雙次第示現彼前四門是義云何此中不一亦不二者顯彼初雙二諦離邊以有無常爾故不一聖智照空故不二故第二不常亦不斷者顯第二門二諦離邊以法界不變故不斷第一無二故不常故第三不來亦不去者顯第三門二諦中道以因緣和合而無從來因緣破散而無所去故第四不生亦不滅者顯第四門二諦中道以不壞假名而非有生用顯實相而非有滅故是謂別門八不義也而二相即聖智無二者前說四雙皆不相離故離諸邊而不隨中謂如不一即是不二乃至不滅即是不生如是相即遠離諸邊如是二諦相即不離所以二智隨境無二是故無二之二諦境能為無二之二智母以之故言無二故是諸佛菩薩智母然智母之義略有三種一者一切眾生本覺之性始覺所依故名智母能與始覺而作本體二者一切菩薩當來佛果現智所依故名智母未得之時彼名佛性已得之時名薩婆若如人王經言一切眾生性根本智母即為薩婆若體諸佛未來以當佛為智母未得為性已得薩婆若三乘般若不生不滅自性常住一切眾生以此為覺性故案云三乘以下重顯第一本覺之性故言常住亦名覺性也三者二諦中道非本非當能生聖智故名智母今此文中顯第三義也十方以下第三總結正明智母竟在於前此下第二諸門分別於中有二先問後答初問之中即發三問先問能覺之頓漸次問所斷之一異後問脩時劫數久近答中有二一者讚問許說二者對問正答此中次第答前三問先答初問於中有二正答結答初中正明是頓非漸然此漸頓有二義一者依人漸頓二者對境漸頓依人漸頓者若依一人相續始終即漸淨諸漏其智漸增若依諸人眾多相續即頓淨諸漏頓成正覺如楞伽經言譬如奄摩羅菓漸次成就非為一時大慧眾生清淨自心現流亦復如是漸次清淨非為一時又言大慧譬如阿梨耶識分別現境自身資生器世間等一時而知非是前後報佛如來亦復如是一時成就諸眾生界置竟天淨妙宮殿脩行清淨之處乃至廣說故第二對境明漸頓者若對十重法界伏除十種鄣等即須漸除其智漸增若對一法界門永斷生得無明直是頓覺亦為頓斷以金剛以還唯是仰信未能見故如仁王經言從習忍至頂三昧皆名為伏一切煩惱而無相信滅一切煩惱生解脫智照第一義諦不名為見所謂見者是薩婆若是故我昔以來常說唯佛所知見覺頂三昧以下至於信忍所不知不見不覺唯佛頓解不名為信漸漸伏者慧雖起滅以能無生無滅此心若滅即累無不滅無生無滅乃至廣說故今此文中通就二門以顯頓義初言一億八千無垢大士即坐達法性原者是依諸人顯一時達一心原而成妙覺也次言頓覺無二一切法一合相者是對境界以明頓覺一合相者一法界故是前二句明自覺義從法會下顯覺他義是故以下第二就答於中有二結頓結同先結頓中即有二句無漸覺世尊者是結眾人一時達義唯有頓覺如來者是結頓覺一合相義三世以下結同說也此下第二答一異問於中有二先遮其義一後許其義異初中有三一者總遮二者別釋一過三者舉人結過初中言無明者謂無明藏即是無始無明住地所言心者謂自相心神解為性於中委悉後文當說自相心神終至佛地其無明者是所斷法是故不可以為一也別顯過中即顯四過一凡聖非二過二大味不異過三者舉正顯邪四者以近況遠初中有二正顯重釋正顯中言解者身相神解乃至證理慧解言無明者根本無明言諸見者七種見等若使神解與無明一即其慧解與諸見一故無縛解凡聖為一也釋中有二直釋轉釋中言而共一心者無明諸見共一解心故生滅一時者非前後共是一剎那故不別者結前一心不異者結前一時大味不異過相可知一切菩薩已下第三舉正顯邪復以已下第四以近況遠無相心中有無明者彼師執言凡一切法是非無定有所善者必有不善有所知者必有不知如一聖智望下為知名為智慧望上不知即是無明作如是執故成大過而言以下第三結過也我法以下第二許異於中有二一者略簡是非二者廣顯異相簡是非中即有四句初句許其同一行者行者即是假名眾生眾生之用總御諸法眾生之義處處受生縱即逕於三世橫即攬於五陰攬五陰故善惡皆屬一人逕三世故前後相續百劫是為佛法之正義也第二句遮同一心義心是陰法法是差別善惡不同前後不一是故不得同一心也第三句者引佛證別第四句者舉果責一略簡是非竟在於前是故以下廣顯異相於中有四一者簡別善惡因果二者重顯善因善果三者會通教理不違四者精釋果因無差初中言一切善受佛果者謂生得善及作得善皆為正因受佛果故無明受有為生滅之果者生得無明作得無明皆為正因受生滅果故是故以下舉果結因順理因果通名為善違理因果通名惡故也故名以下第二重顯善因善果於中二句初句直明後句重釋初中言善不受生滅之果者善非無明亦寂靜故唯受常佛之果者善是隨順寂靜性故重釋中言凡聖一切善皆名無漏者是釋唯受常果之由由其隨順寂靜之性違逆諸漏故名無漏所以然者由因緣故言由因者謂生得善隨順本覺正從性淨本覺而來從是轉成諸作得善所以凡夫一切善法皆順本覺寂靜之性違返諸漏故名無漏是義分明出受學覺品也言由緣者凡諸世間所有善根皆依諸佛無緣大悲平等福田而生長所以隨順如來福田違逆諸漏故名無漏由是二緣性是無漏故不得已還歸寂靜歸寂靜故受常住果如大悲經言佛言阿難若人樂著三有果報於佛福田若行布施諸餘善根願我世世莫入涅槃以此善根不入涅槃無有是處是人雖不樂求涅槃然於佛所種諸善根我說是人必入涅槃案云此中入涅槃者謂入如來大般涅槃由佛福田之所引故還同此經常佛之果而餘處說有漏善者望傍緣說故不相違也而言以下第三會通於中先會權教後通實理初中而言受漏果者謂經說五戒十善受人天果如來為化下劣眾生畏三途苦求人天樂背三業惡行諸善法故約緣因作如是說言緣因者謂十善等若望佛果即為正因望人天報但為緣因報因直是增上緣故此是會教次通道理言非為漏因者無明業受果故者前說諸善不受漏果世間所有生滅漏果正是無明業所受故所以不為善業正果此中無明業受果者由無明力不覺心動心動之相名為業識無明與業以為正因遍生一切生死之果是謂如實因果道理也會通教理竟在於前此下第四精釋果因於中有二先果後因果中言是名三受三苦者謂無明業之所受果即是三受亦名三苦苦受在於惡趣二在於善道於中樂受三禪以下其捨受者四禪已上苦受說名苦苦樂受說名壞苦第三捨受名為行苦通即三受皆是行苦此是顯果差別下即對因分別二受善緣因果者樂捨二受善業增上緣因之果苦苦惡因果者三途苦苦惡業因緣所生之果一切皆苦無明為本者一切三受皆是行苦齊由無明為本因故良惡有輕重三品故果有三途苦別善有粗精二別故果有樂捨不同粗善有散有定故樂通欲色二界精善愛心故捨貫色無色界如是善惡輕重三界精粗齊以無明業識為本是故三途諸苦三界諸受等以剎那行苦為體以其因中無明無厚薄業相無麤細是故其果行苦無輕重剎那無奢促故言一切皆苦無明為本當知因果道理毫釐無差違耶此下第三答第三問於中有二牒問答問答問之中亦有其二先明劫數多少後顯行道久近初中亦二先判三品劫量後別眾多劫名初中言三銖者六銖為一分三銖即分半也一切賢聖以下次明行道久近於中有二先明行時久近後顯行法多少初中亦二正明別顯正明中言一切賢聖入數量者謂三賢初始入量理乃至等覺為其後邊於其中間逕於百劫者謂如前說萬里之劫以為一數至於百劫故名百萬阿僧祇劫次簡別言若入是數得佛不久者雖逕百萬不以為久故又初發心時便成正覺故已知百萬即入一念故若不入者不名菩薩者未得不退非實菩薩故法門者以下明行法多少於中有二先明轉增後結總攝因果品因果品者如來為說有二分中初廣開門竟在於前此下第二就略攝門以辨經宗此中略立因果二門總攝六位行德四十二賢聖故所由為因所起為果由起相待通為因果此中顯是義故名因果品也在文有二先問後答問中二句領前問後答中亦二別答結答別中亦二先因後果因中有二先明能生根本後顯所出德行初中亦二總明別釋總明之中有其三句一者舉人標行言十般若者十度皆以慧為首故離慧不能忘三輪故二者釋本三者結本也別釋之中先牒後釋華嚴經說十度之中各有十種今此經中略立三三攝彼十十於中前七文顯可知方便三中巧會有無者因緣合故謂之有非曰有是有因緣散故謂之無非曰有是無若如是一一切難問無不會通故曰巧會不捨不受者謂於生死涅槃諸法達如夢非有非無故不捨非有故不受故於一切無所障礙也通力中言報通者依無分別智力任運自在故脩定通者依脩邊際定力作意自在故變化通者依通慧力十四變化故不同其前二力也第十中言無相智者以分別智觀無相理故第六慧度是無分別故此下明其所出德行於中有三謂標釋結標中言十智者即是前說十波羅蜜十皆名智如前釋故此舉能生根本總標所出德行七財以下別釋所生於中有三一者正明所生德行二者示彼所照之境三者顯其所除之障初中有二別明總舉別明之內略顯八門第一明七聖財一切賢聖用此七德長養法身資益慧命用之成佛終無窮盡以是義故名為聖財故言賢用成佛故說財賢聖所用德行眾多所以取七為聖財者良由信為眾德之基施為出信之利戒能除劫財難聞能採集諸珍慚崇善而增長愧拒惡而遠離慧能將導六財令其增進六入賢聖豐饒此七為要是故說此名為七財總說雖然於中分別者此中七財十度所生所以但取殊勝信等如是七中皆有十種如十無盡藏品廣說彼言何等為菩薩信藏此菩薩信一切法空無真實信一切法無相信一切法無願信一切法無作者信一切法不實信一切法無堅固信一切法無量信一切法無上信一切法不可度信一切法不生乃至廣說案云是明深信其深法空一信空無真實者諸佛如來真實功德無所有故二無相者諸佛相好不可得故三無願者大願所度眾生空故四無作者者法性緣起無能作故五不實者虗空無為不成實故六無堅固者涅槃常住無堅實故七無量者過去世空無可進求思量法故八無上者未來世空無應當得增上法故九不可度者現在十方世界亦空不可圖度遠近等故十不生者三世劫空曾今當生不可得故能信十種皆不可得而不撥無一切諸法如彼下文言皆諸佛法不可思議心不驚怖乃至皆入一切劫不可思議心不驚怖故如說信財有十如是後六亦爾第二明四攝者瑜伽論菩薩地云何菩薩方便所攝身語意業謂四攝事復何因緣唯四攝事說名方便謂諸菩薩由是四種於諸眾生普能攝受調伏成熟除此無有若過若增何等名為四種方便一隨順方便二能攝方便三令入方便四隨轉方便何以故先以種種財物布施饒益有情為欲令彼聽受所說奉教行故次行愛語於彼彼處有愚癡者為欲除彼所有愚癡令無餘故令其攝受瞻察正理如是名為能攝方便若諸菩薩知彼有情受瞻察正道理已次行利行拔彼有情出不善處於其善處勸導調伏安處建立如是利行名令入方便若諸菩薩如是方便令諸有情得趣入已最後與其於正事業同共脩行令彼隨轉由是因緣令所化者不作是念汝自無有圓滿淨信尸羅施惠何賴於善勸導於他諫悔呵擯與作憶念是故菩薩同事攝事當知是名隨轉方便論說如是今此經言利益𣽈語施法同事次第雖異行實應同也第三明四辨者是四無礙義如上說第四明四依者初捨世間眾生所依行次捨世間飾詞文句三捨佛教不了義經四捨了經聞慧分別如其次第漸趣入故如顯揚論云所依者謂四種依廣說如經一依法不依眾生謂若法是如來所說或弟子說十二分教隨學隨聽不眾生所行行學亦不隨轉二依義不依文謂若法非餘詞者所造綺文字句唯能顯了獨法清淨鮮白梵行於此法中恭敬信解非於能顯顛倒梵行及不顯了梵行但飾詞者所造綺文字句三依了義經不依不了義經謂於如來所說相似甚深空性相應隨順諸緣緣起法中不妄執著如言淺義亦不住自內見取心唯勸尋究顯了義經四依智不依識謂不唯聽聞而生知足便不進脩法隨法行然為盡諸漏勸求自內證真諦智故第五十力第六四無畏第七六通第八三明如是四門後文當說此是別明次言百萬億阿僧祗功德者第二總舉上來第一正明所生一切德行此下第二示所緣境於中有三謂標釋結初言次第生智能緣八世諦一切法者舉能照智標所緣境第一義諦無相易照故今但顯世諦差別第二別顯八世諦法一者四諦染淨二法各有果因故二者二諦初門二諦皆是世諦故三者十二緣義如前說故四者緣成假如陰緣成一假人又四塵緣成一假柱等如經緣成假法無我有法故五者相待假相待有三一相集相待如長短等二相避相待如青黃等三相對相待如有無如經相待一切相虗故六者相續假依前後念以成一假從前至後不斷絕故如經相續名一空不可得故七者法假一剎那頃心心所法及諸四塵極微等法從因而生相集而起離緣非法即法非緣名因生假亦名法假如經因生集起即法非緣實實集有名生成法故實實集有者如一極微是緣成假之實又剎那是相續假之實如是諸實相聚故言實實集有即諸極微名為法假八者受假如極微觸以成麤觸受本觸名起觸對用如說觸塵同類相成餘色香味當亦爾不同前說緣成假法攬異類緣名緣成假如經法假造法受名起用名聚法故同法相集故名聚法以微成麤故言造法三假門內第三名假已顯於故不重說諸前第二二諦之有中諦正是名假義故是故以下第三總結如是八門皆有有為故言八有為法然四諦之中滅諦二諦之內無諦相待假中無為此三雖非有為從多通名有為言本智者謂入觀時雙照之智對出觀智名為本智雙照之內量智邊照是八皆名世諦法故其出觀智亦照此八但為乘顯能治障故說其本智以出觀智不斷障故此下第三顯所除障於中有三謂標釋結初言復從是智能除者謂前本智除障故五葢以下別顯諸障因果諸患通為所除此中略舉十八種法言八倒者有為四倒無為四倒故九惱者謂九惱處九惱處者三三為九一愛我怨家二憎我親愛三正來惱我此通三世故成九惱其餘諸門如常所說言四結者即是四繫如對法說惱結中言皆名不善者皆違涅槃真實善故上來三分合為第二別明所生十智以下第三結勸言十智境所除者謂十智之境八世諦法十智所除十八不善是舉非因此餘所有一切功德皆名佛因故應受行八世諦法不名因者彼境界門非因義故汝先以下第二顯果在文有三牒問釋結第二釋中亦有三分初顯體果次釋義果三者重明體義二果初中有二先明一體之相後顯二身之門初中亦二一者舉因標果二者正明果體初中言為性體者是一法界故其體者以下正顯無二相於中亦二別顯總明初別顯中有二七對非有非無者非有一果體非無一果體故非大非小者入一極微而無遺包十方界而餘故非身非心者離長短等形質離有無等緣慮故非相非三世者離此彼處相離前後時謝故非天非人者不在高空不在下地故非名字非常樂我淨者非芳名之可讚非妙德之可歸故非六道非六識入者非善惡之所生非名色之可取故非數量法過一切法相者總結前七對也非福田非鬼神者無福無罪故非動非靜者無散無定故非生滅非第一者非俗非真故非五色非六大非土田者非別非總故非法界非三界者非本非末故非縛解者不染不淨故非明闇者不智不愚故非得法寂然無為者總結前七對也言寂然者遠離七對二邊相故言無為者雖離二邊不為中故由是道理故非得法也一切以下第二總明於中有二正明遣疑初中言一切法外者出離如前二重七對一切法故心行處滅者出離諸法亦離其離無所據故其處難量者雖非有得而非無得故次遣疑者有眾疑云若果如是心言絕者何故如來記菩薩言於爾許劫行種種行於某世界當得作佛如是如是示當果耶為遣是疑故言就有諦中脩劫量行而有果報果報者淨土色身相好果報此等皆就有諦中說今此中說二諦之外由是道理不相違也此下第二明二身門於中有二一者正明如來二身二者乘顯下地二身初中四句一者總二者別顯三明二身常住四結諸佛道同第三中言如影隨形者是明果身常住離生滅故應身亦常離生滅不同菩薩二身無常也次明下地皆有二身於中有二正明總結初中亦二先明菩薩二身無常後顯凡夫二身不同佛子以下第二總結佛子以下次明義果於中有三總標別釋第三總結初中言義功德者體果妙絕離相性無為無作但無所為故無所不為為諸眾生作諸義利故於一體出無量義無量功德德義積聚故名為身即是應化法身之身如下文言住是妙覺地中唯現作可名有無量義有無量名其出一體所謂妙果常住清淨至若虗空不可思議不可說不可名數不可名入界分可得故諸佛道同果法不異者十號等德諸佛同故所謂以下第二別明於中略顯八十八德先明十號然此十號經論不同或有處說佛為第十或有處說佛為第九今此經中依前門說一如來者十號經言我即他曰如他即我曰來涅槃經言諸佛世尊從六波羅蜜三十七品十一空來至大涅槃如來亦爾是故號佛為如來也瑜伽論云言無虗妄故名如來佛性論云從自性住來至至得故名如來也二應供者瑜伽論云已得一切所應得義應作世間無上福田應為一切恭敬法養是故名應三正遍知者論云如其勝義覺諸供故名正等覺四明行足者論云明謂三明行如經說止觀二品極善圓滿是故說名明行圓滿五善逝者論云上升最極永不退還故名善逝六世間解者論云善知世界及有情界一切品染淨相故名世間解七無上士者涅槃經言上士者名之為斷無所斷者名無上士諸佛世尊無有煩惱故無所斷是故號佛為無上士又上士者名為諍訟無上士者無有諍訟如來無諍是故號佛為無上士乃至廣說八調御丈夫者涅槃經言自既丈夫復調丈夫復善男子言如來者實非丈夫非不丈夫因調丈夫故如來為丈夫也善男子一切男女若具四法即名丈夫何等為四一善知識二能聽法三思惟義四如說脩行若男若女具足四法即名丈夫若有男子無此四法即不得名為丈夫也何以故身雖丈夫行同畜生如來調伏若男若女是故號佛調御丈夫乃至廣說瑜伽論中合此二號以為一言一切世間唯一丈夫善知最勝調心方便故名無上丈夫調御士九天人師者論云為實眼故為實智故為實義故為實法故與顯了義為開導故與一切義為所依故與不了義為能了故與所生疑為能斷故與甚深處為能顯故令明淨故與一切法為根本故為開導故為所依故能正教誡教授天人令其出離一切眾苦是故說佛名天人師案云為實眼者有證道慧現見義故為實智者有教道智能決斷故為實義者開示諸法離言義故為實法者安立無倒言教法故下之六句反之可知具此十法名之為師十佛陀者論云於能引攝義利法聚於能引攝非義利法聚於能引攝非義利非非義利法聚遍一切種現前等覺故名為佛案云是顯具一切智以是三聚一一通於善惡無記於中委悉唯佛覺故下總結言具向十德故為一切眾生所供養者此是總名為世尊義若以此名為第十者如瑜伽說能破諸魔大力軍眾具足功德名薄伽梵次明十八不共法者此三六法不與阿羅漢人共同故名不共初六無失不共同者謂阿羅漢諸漏永盡方入聚落遊行乞食或於一時與諸惡象及惡狗等共路而行或阿練若棄捨正路行邪惡徑如是等類羅漢誤失如來於此一向永無是故言身無失也又阿羅漢或於一時由忘念故於所作事而有喪失如是忘念如來永無是故言念無失也又阿羅漢或於一切時阿練若迷失道路或入空揚聲大叫呼噪遠聞或因習氣無染汙心騫脣露齒逌爾而咲如是等類所有暴音如來於此永無所有是故言口無失也無異想者如阿羅漢於有餘依生死界中一向發起猒背之心於無餘依涅槃界中一向發起寂靜之想如來於彼無差別想安住第一平等捨故無不定心者如阿羅漢若入等至即名為定若出等至即不名定如來遍於一切位中無不定心故無不知已捨心者如阿羅漢不善思擇而便棄捨利眾生事如來於此永無所有故次六無減者如阿羅漢依所知障淨由未得退退失念欲乃至知見如是退法如來永無故言念無減等此中前四取所知鄣能對治道後二無減彼所得果如來於此因滿果圓故無減也後六法者如阿羅漢或於一時善身業轉或無記轉語業意業當知亦爾如來三業智前行故智隨轉故無無記也又阿羅漢遍於三世所知事中不能率爾作意便解是故知見說名有著不能一切無餘正解故名有礙如來遍於三世境界率爾作意便能正解一切所知境事差別今此經言身業隨智慧行等者隨前行智慧及俱行智慧故知三世中言有礙者離彼不能無餘正解之礙故無障者離彼不能率爾便解之著此等具如瑜伽論說彼云此中初四是無忘失法及拔習氣所攝次一是大悲所攝所餘當知是一切種妙智所攝次明十力依此十智有十種事能伏邪說故名為力是處非處力者如理通達一切因果是處非處若沙門婆羅門說無因果及不平等因果之法即能制伏令墮負處此事因彼初力得成也業力者如來知見自業自受無有自作他受果者若沙門婆羅門邪說邪教度業度受便能制伏令隨負處此事因業智力得成也定力者如來教化顯三種輪一神通輪二記心輪三示教輪訓導弟子以成聖眾若沙門婆羅門有勝負心說違逆法對治正典便能制伏令墮負處此事因定智力得成也根力者如來了達上中下根如來為說令其下種成熟解脫此事因根智力得成也欲力者如來知見三品眾生邪正欲樂如實見已拔斷惡欲增長善欲此事因欲智力得成也性力者如來觀知眾生種性有麤中妙令此三人如理得入種種法門此事因性智力得成也果力者餘處名至處道力如來明見出離道法得解脫果障礙道法得生死果令滅障道脩出離道此是果力所成事也天眼力者餘處亦名生死智力如來明見一切眾生死此生彼如理授記若執斷見沙門婆羅門便能制伏令墮負處此是天眼智力所成也宿命力者如來明了見宿命事說過去事為令眾生起猒畏心若執常見沙門婆羅門便能制伏令墮負處此是宿命智力所成也結盡力者如來自知解脫通達無礙若增上慢沙門婆羅門未得羅漢謂言已得即能制伏令墮負處此是漏盡力所成事也具如無上依經說也次明四無量謂慈悲喜捨義如上說也次四無畏言我是一切智人者是一切智無畏我漏已盡者是漏盡無畏無漏出煩惱道者是說盡苦道無畏煩惱障道者是能說障道無畏此中前二自具智斷後二令他智斷具足如論說言師及弟子智斷具足此之謂也次明六通亦如前說次明五眼五分法身義如常說次明無罪三業者所謂如來三種清淨故言無罪如華嚴經言如來正覺成菩提時住佛方便得一切眾生等身得一切法等身得一切剎等身得一切三世等身得一切如來等身得一切諸佛等身一切語言等身得一切法界等身得虗空界等身得無閡法界等身得出生無量等身得一切行界等身得寂靜涅槃界等身佛子隨如來所得身當知音聲及無礙心亦復如是如來具足如是等三種清淨無量案云此中十三等身即是無罪身業十三等音即是無罪口業十三等心即是無罪意業以無罪故無障礙無障礙故無邊際也也明三寶隨所示現無不玄則故遍涉六道恒與和合故如前菩薩三寶義同但彼未圓滿亦非常住今是圓極常住三寶方廣經言於一佛寶即有法僧此之謂也次滅諦者無仰四諦門中滅諦無明住地斷滅所顯即是大淨波羅蜜也次解脫者無礙解脫此有十種如大經言一切諸佛有十種無閡解脫何等為十一於一微塵中悉能普現不可說不可說諸佛出世二於一微塵中悉能普現不可說不可說諸佛轉淨法輪三於一微塵中教化調伏不可說不可說眾生四於一微塵中普現不可說不可說佛剎五於一微塵中授不可說不可說化菩薩記六於一微塵中普現三世諸佛出世七於一微塵中普現三世一切佛剎八於一微塵中普現三世諸佛自在神力九於一微塵中普現三世一切眾生十於一微塵中普現三世一切諸佛佛事是為一切諸佛十種無閡解脫也次靈智者深玄難測是靈智義出生無窮是靈智義此有十種如大經言一切諸佛有十種出生住持智慧何等為十一一切說法無所趣向而能出生清淨願智二一切法無身而能出生法身智慧三一切諸佛悉無有二而生正覺悟一切法四一切諸法悉無有我無有眾生而能出生化眾生智五一切諸法悉無有相而能出生種種相智六一切世界悉無成敗而能出生世成敗智七一切諸法無有造者而能出生業報智慧八一切諸法無可言說而能出生說法界智九一切諸法無有垢淨而能出生垢淨智慧十一切諸法無有生滅而能出生緣起智慧是為十種出生智慧也次一乘者謂於佛所種善根者皆無異趣莫不同到大涅槃果故說佛德名為一乘為顯是義而說三喻如大經言譬如丈夫食少金剛終竟不消要從身過至金剛輪然後乃住所以者何以彼金剛不可消故如是佛子於如來所少殖善根能壞一切有為煩惱乃至究竟如來涅槃智慧然後乃住所以者何於如來所種諸善根不可盡故佛子譬如須彌山等大乾草聚若有人持如芥子火悉能燒盡何以故火性悉能燒故於如來所種少善根亦復如是悉能燒滅一切煩惱無有遺餘究竟涅槃何以故於如來所種諸善根性究竟故佛子譬如雪山有大藥王名曰善現若有見者眼得清淨若有聞者耳得清淨若聞香者鼻得清淨若嘗味者舌得清淨若有觸者身得清淨若取彼地土悉能除滅無量眾病安隱快樂如來正覺無上藥王亦復如是常以一切諸方便行饒益眾生若有得見如來色身眼得清淨若有得聞如來名號耳得清淨若有得聞如來戒香鼻得清淨若有得味如來法味舌得清淨得金剛廣長清淨舌根悉能演說一切言音若有得觸如來光者彼人即得清淨色身究竟逮得無上法身若有念如來者得念佛三昧正念不亂若有得經卷地如來塔廟禮拜供養彼眾生等具足善根滅煩惱患得賢聖果佛子乃至不信邪見眾生見聞佛者於見聞中所種善根果報不虗乃至究竟涅槃斷一切惡具足善根乃至廣說是名如來一乘功德也次金剛寶藏者佛有十種堅固法寶積集名藏如大經言一切諸佛有十種堅固士法何等為十一諸願堅固不可沮壞如說脩行言行相應二盡未來劫脩菩薩行功德莊嚴未曾恐怖三為化一切眾生故悉詣不可說不可說世界教化眾生無有留難四於信不信眾生大悲等觀而無有異五從初發心乃至正覺於其中間未曾退失菩提之心六脩諸功德皆悉迴向一切種智不求世行七於諸佛隨順脩學身口意業永離聲聞獨覺之心八平等普照無量無邊諸佛正法淨得菩薩心究竟具足一切種智九悉能捨離一切世間令諸眾生悉滅諸苦逮得寂滅平等快樂十為諸眾生受無量苦皆欲建立諸佛種姓超出生死得十力地是為一切諸佛十種堅固士法如是名為金剛寶藏也次法身藏者應化法身眾德積集名法身藏一云次法身藏者五相五德積集名藏如無上依經言第一身者與五種相五種功德相應何者五種相一者無為二者不相離三者離二邊四者脫一切障五者自性清淨何者五種功德一者不可量二者不可數三者難思四者不共五者究竟清淨如是十法相應不離故名法身藏也次自性清淨妙藏者謂諸如來無邊功德無所不通通於染淨在於惑地不染曰清在於淨地不淨曰妙故名自性清妙之藏如無上依經言云何如來為功德不可思議一切如來恒河沙劫無邊功德在於惑地及於淨地相攝相應未曾相離無垢無淨不可思議故次三達者謂無始過去通達無餘無邊未來通達無餘現在無邊十方法界究竟通達故名三達又復通達一一念法無不具有三種三世故名三達如大經中九世中說也次三無為者仁王經言於第一義諦而不二為法性無為緣理而滅一切相故為智緣滅無相無為住初忍時未來無量生死不由智緣而滅故非智緣滅無相無為案云彼經約初地說即是少分三無為德今此經中說於佛德即是圓滿三無為也次三明者如涅槃經言菩薩明者諸般若波羅蜜諸佛明者所謂佛眼無明明者謂畢竟空案云若論位別初明在因地第二在果地第三明者通於因果就其通門皆在佛地何者大圓鏡智照一法界佛性之門名為佛眼是諸佛明妙觀察智照遍滿等是菩薩明所達空理無明無闇是無明明如是名為如來三明也次一諦一道者無作四諦門中道諦金剛心時與苦集俱故有三諦今至佛地離二唯一一謂一道如是一諦通泰無閡諸佛道同故名一道如經頌言文殊法常爾法王唯一法一切無礙人一道出生死也次獨法者是大我德無與二故言大淨德但從義類前說淨德滅諦淨類義相近故今從一道方說獨法一之與獨義相類故滅除四障顯此四德如無上依經言一切阿羅漢辟支佛大地菩薩為四種障不得如來法身四德何者為四一者生緣惑二者生因惑三者有有四者無有何者生緣惑即是無明住地生一切行如無明生業何者生因惑是無明住地所生諸行譬如無明所生諸業何者有有緣無明住地因無明住地所起無漏行三種意生身譬如四取為緣三有漏業為因起三種有何者無有緣三種意生身不可覺知微細隨滅眠譬如緣三有中生念念老死無明住地一切煩惱是其依處未斷除故諸阿羅漢及辟支佛自在菩薩不得至見大淨波羅蜜因無明住地起輕相惑有虗妄行未滅除故不得至見大我波羅蜜緣無明住地因微細虗妄起無漏業意生諸陰未除盡故不得至見大樂波羅蜜若未能得一切煩惱諸業生難永盡無餘是諸如來為甘露界即變易死斷流滅無量不得不至見極無變異大常波羅蜜乃至廣說故且止乘論還釋本文釋義果內有三分中第二別釋竟在於前一切以下第三總結於中二句先舉義果後結道同別釋果內有三分中初釋體果次釋義果如是二分竟在於前果體以下第三重顯體義二果於中有二別顯總結初別顯中先明體果此中十句先五正明後五結成初中言果體圓滿無德不脩理無不周者是舉果極法身之門第二句言居中道第一義諦清淨國土者是舉自受用土之門第三句言無極無名無相者法身淨土唯一法界互相融通無有邊際故言無極言語路絕故言無名心行處滅故言無相第四句言非一切法可得者一切功德無所不備而諸功德皆不可得故第五句言非有體非無體者雖非有一果體而非無一果體故其法界離有無性一切功德皆相稱故如無上依經言一切佛土更無所礙一切如來隨順平等過作竟境無分別相猶如虗空無有分別與法界相稱故其一以下第三結前於中五句作三分結初二順結前之二句次二逆結後之二句第三一句結中間句一照相者是結無德不備理無不周之句以一功德無不一照理與智冥亦為一照故一合相者結居中道第一諦清淨國土之句佛與淨土相會無二乃名為居中道國土故一體相者結第五句以非有體不墮無體其非無體不當有體所以直是一體相故一覺相者結第四句覺一切法同無所得是一覺相故淨明無二者是結中間無極無名無相之句淨土佛明同一無極又離名相為無二故是果以下次顯義果於中有四一舉體果以標義果二就義果顯其差別三明建立義果之意四示能解義果之利初中言是果獨法圓明常住者重舉體果也一果體相有無量義者依體立義也義有無量德德有無量名者一一義中有無量德德中亦有無量名也義果者以下第二顯差別滅諦者是舉淨德樂者大樂常者無為我法者前獨法是舉八十八中最後十八不共一切功德通舉前說八十四門言果果者以從體果出義果故義德名以下第三建立意皆教化故有者皆約應化法身之義教化眾生門以立如是義德名也若賢人下第四示勝利賢人者諸三賢也一切眾生者住前凡夫也若能解是三句之意教化門說非如言有者已得成佛之初萌兆故為三世諸佛所記也重顯二果有二分中第一別顯竟在於前其果以下第二總結其果不可說不可知者體果義果皆絕名言故不可說隨言之智亦不能知但隨眾生名相之法寄言假說體義之相故言而就名相法中說名相法下顯假說二果差別佛答之內有二分第一別答因果義竟吾說以下第二結答大眾受學品正說分內有二分中第一如來為說分竟此下第二大眾受學受者受戒學者學行不起一坐而受十戒仍學六入從始至終此中顯是義故言受學品在文有二先問後答問中亦二先序儀意次正發問發問之中領前問後答中有四一者放光集眾為欲證明一坐受學故二者歎問勸學此中告七菩薩者華嚴會中七會主故能問三觀者是示問中言受學脩道脩道之言顯三觀脩故次言法界諸佛自性清淨道者是示問中從始至終一一具行之句次言一切菩薩所脩明觀法門者是示問次第入菩薩位者之句又此三句初總後別言初總者所謂三觀總舉受學脩道之言言後別者第二句別顯道言第三句別顯脩言汝等以下勸學可知佛子我今更重說以下第三許說若一切眾生以下第四正答此中有二別答總答初中亦二先受後學受中有三謂標釋結標者舉信標戒要先起信方受戒故始行以下第二廣釋於中有四一者受戒法用二者佛告以下受戒方便此中有三先三禮三寶次敬受四依後即悔過若准小乘受戒羯磨此中敬受四歸應是正為授戒但尋此中經文之勢此敬受文非正授戒以先受後悔不應理故故判此文為方便也如是以下第三明正授戒於中有三一者牒前悔過標正與受二者正授十戒三者結歎戒德此三合為第三明正授戒文意若過去未來以下第四諸門分別言有受法而無捨法有犯不失盡未來際者如菩薩地決擇中言若有不捨如是律儀當知餘生亦得隨轉非彼捨者又捨因緣略有四種一者決定發起受心不同分心二者若於有識別大丈夫前故意發起棄捨語言三者總別毀犯四種他所勝法四者若以增上品纏總別毀犯隨順四種他所勝法由此因緣當知棄捨菩薩律儀若有還得清淨受心後應還受如是論文與此經違如何和會解云彼論述於三乘教意故有捨法犯戒有失依三乘教發心菩薩心不全故不堅固故今此經者是一乘教故無捨法犯而不失依是發心與前返持且止乘論還釋本文爾時眾中以下第三總結受戒即從坐起受持佛戒者此一坐始起受戒不起此坐入六入故其名以下第二明學於中有二別明總明別明之中即明六入六入文中皆有二句先明入位後顯學行初中言脩十戒滿足入初住位者是明入位復從以下次顯脩行言十信者如大經言菩薩有十種不壞信何等為十所謂於一切佛不壞信於一切佛法不壞信於一切聖僧不壞信於一切菩薩不壞信於一切善知識不壞信於一切眾生不壞信於一切菩薩大願不壞信於一切菩薩行不壞信於恭敬供養一切諸佛不壞信於教化一切眾生成就菩薩巧妙方便不壞信是為十種言十進者菩薩有十種精進所謂淨身業精進恭敬供養諸佛不退轉故口業精進隨所聞法廣為人說無疲倦故意業精進巧方便入慈悲喜捨禪定解脫三昧相續無退轉故直心精進遠離諂曲正直一切方便究竟無退轉故深心精進常趣勝趣積集無上智慧白法故行不虗妄精進攝取施戒忍多聞等及不放逸乃至道場不中息故除伏一切魔怨精進悉能除滅三毒煩惱邪見諸纏障葢故滿足慧光精進有所施作悉善思惟心不中悔究竟眾事故無所染著精進離心境界身口意相非相甚深法門故具足成就法明精進次第進入一切諸地乃至現捨天壽降神世間出家成道轉法輪入涅槃故是為十種十發趣者所謂十念念佛法等進趣彼故言十乘者所謂十慧除障運出慧為勝故十金剛者所謂十禪守境寂定不有壞故十隨喜者所謂十施隨喜受者得利益故言十護者所謂十種捨離魔業以離魔業為護佛法故此十十中十念十願出十地品餘八門出離世間品欲具行者於彼尋之如是次第入行入向入地可知無垢地中言一切眾生識始起一相住於緣者麤相而言識有三品最麤末者所謂六識其中品者名為末那細品識者是本識為諸識元故名始起始識內有三細相所謂業相轉相現相是三種相出起信論今言始起一相者正是業相以性清淨心因無明風動是初業相故言一相一相既動必依因緣為之故言住於緣也此一相即有二用一清解之用二昏迷之用如大海水起波之時不失清性是順本清識中解用當知亦爾動時不失本覺之性即是隨染本覺之義如經順第一義諦起名善故又水動時有渾濁用識中迷用當知亦爾如經背第一義諦起名惑故此二為本故名生得其所起者皆作得依生得或起三有心於生得上更有迷用不了所起三有心空此三迷用猶在本識故說此為作得住地彼生得一此作得三是四為本起諸煩惱如經以此四住地起一切煩惱故為始起四住地此四住地不了為用而無麤細行相差別總名無始無明住地如經其四住前使無法起故名無始無明住地故此四住地一心為本二種生死以為其末金剛心時知其末終未達其本一心道理故言知此始起一相有終而不知其始前有法無法乃至唯佛知始終故此餘諸文准之可得佛子我說以下第二總結六入於中有四一者總結六入無不入者二者別結不起此坐入者我本以下第三總結華嚴七處入者今復以下第四還結此會入者一部之經有三分內第二正說竟在於前集散品此下第三流通分在文有二先明勸持流通後示流通方法初中亦二一者勸持受教流通二者現光重勸流通第二中言始行賢者入九觀定者從第三果及無學來始入大故言七淨者瑜伽論云云何名為七種清淨一戒清淨二心三見四度疑五道非道知見六行知見七行斷知見此中道非道者正見前行之道邪見前行非道如實了知行及行斷者四種行迹如實了知何等為四一苦遲通行二若速通行三樂遲通行四樂速通行於此了知最初中迹一切應斷超越義故非由煩惱離繫義故如實了知第二第三一分應斷如是了知初全及二一分應當斷已依樂速通正勤脩集從此無間永盡諸漏故今此文言十戒者是第一淨也心入定者第二淨也見道者第三淨也度疑者第四淨也正道者第五淨也行知見者第六淨也行斷知見者第七淨也以此七淨得入大乘故言得入法也爾時以下第二流通方法於中有四一問二答三者歎悲四者奉行文相可知菩薩瓔珞本業經二卷南職北篤宋剋姚秦涼州沙門竺佛念譯集眾品第一佛重遊道場樹下放四十二光集十首菩薩從十林剎十精進佛所來及集一切諸天眾等賢聖名字品第二說十行十迴向十地等覺妙覺名字皆華梵雙舉又說住前十心信念精進定慧戒迴向護法捨願又說二十四願偈亦說十不可悔戒賢聖學觀品第三謂十住名習種性十行名性種性十向名道種性十地名聖種性次等覺性次妙覺性又名六堅又名六忍又名六慧又名六定又名六觀又名六寶瓔珞一銅寶二銀寶三金寶四瑠璃寶五摩尼寶六水精寶并說六位所修諸行已上經上釋義品第四仍釋前十信及四十二位之義佛母品第五答敬首菩薩問二諦義并說小中大劫差別因果品第六明十波羅蜜各有三緣及說七財四攝四辨四依等為因二種法身為果大眾受學品第七佛復放光集眾囑文殊及善財等七大菩薩各領大眾受學因分別三種受戒及受戒儀式由受戒故次第入於住行向地等妙覺中集散品第八三勸大眾發菩提心乃至再囑須受菩薩戒已方可為說此大法門右出于閱藏知津卷第三十二大乘律藏部內上有佛說梵網經二卷素革禪師評曰此經本與華嚴同部今性品單行故南北二藏皆歸於律此經下曰此亦仍似華嚴部攝智者大師依此判別圖位次今因始終申明十重戒法故南北皆歸律藏
